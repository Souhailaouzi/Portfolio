
# ============================================================
# CI - Lint & Build
# ============================================================
# PURPOSE: Runs on every push and pull request to ensure
# the code compiles correctly and follows linting rules.
# If this fails, the PR cannot be merged (when branch
# protection is enabled).
# ============================================================

name: CI

# ---- WHEN does this run? ----
on:
  # On every push to any branch
  push:
    branches:
      - main
      - feature/*

  # On every pull request targeting main
  pull_request:
    branches:
      - main

# ---- WHAT does it do? ----
jobs:
  lint:
    # "runs-on" = which virtual machine to use
    # ubuntu-latest = a fresh Linux machine provided by GitHub for free
    name: Lint
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your code onto the runner
      # Without this, the runner is an empty machine with no code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Node.js on the runner
      # "cache: npm" = caches node_modules between runs for speed
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # Step 3: Install dependencies (same as running "npm install" locally)
      # "ci" = clean install, uses exact versions from package-lock.json
      # This ensures the CI environment matches your local environment exactly
      - name: Install dependencies
        run: npm ci

      # Step 4: Run the linter to check code quality
      # This is the same as running "npm run lint" on your machine
      - name: Run lint
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest

    # "needs: lint" = this job waits for lint to pass first
    # If lint fails, build won't even start (saves CI minutes)
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Step 4: Build the project (same as "npm run build")
      # This catches TypeScript errors, import issues, and build failures
      - name: Build
        run: npm run build

      # Step 5: Upload the build output as an artifact
      # Artifacts = files produced by CI that you can download later
      # This is useful for debugging or for deployment jobs to pick up
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: out/
          retention-days: 7

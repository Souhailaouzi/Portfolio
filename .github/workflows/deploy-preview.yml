# ============================================================
# Deploy Preview
# ============================================================
# PURPOSE: When a PR is opened, this deploys a temporary
# preview version of the site to Netlify. This lets you
# (and reviewers) see the changes live before merging.
#
# HOW IT WORKS:
# 1. Builds the project
# 2. Deploys to Netlify as a "draft" (not production)
# 3. Posts the preview URL as a comment on the PR
#
# REQUIRED SECRETS (set in GitHub repo Settings > Secrets):
# - NETLIFY_AUTH_TOKEN: Your Netlify personal access token
# - NETLIFY_SITE_ID: Your Netlify site ID
# ============================================================

name: Deploy Preview

on:
  pull_request:
    branches:
      - main

jobs:
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest

    # "permissions" = what this workflow is allowed to do
    # It needs to write PR comments (to post the preview URL)
    permissions:
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Deploy to Netlify as a draft (not production)
      # "--dir=out" = the folder to deploy (our static export)
      # "--json" = output the result as JSON so we can extract the URL
      - name: Deploy to Netlify
        id: netlify
        run: |
          npm install -g netlify-cli
          OUTPUT=$(netlify deploy --dir=out --json --auth=${{ secrets.NETLIFY_AUTH_TOKEN }} --site=${{ secrets.NETLIFY_SITE_ID }})
          echo "preview_url=$(echo $OUTPUT | jq -r '.deploy_url')" >> $GITHUB_OUTPUT

      # Post a comment on the PR with the preview link
      # "github.token" is automatically provided by GitHub Actions
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.netlify.outputs.preview_url }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🚀 **Deploy Preview Ready!**\n\n🔗 ${previewUrl}\n\n_This preview was automatically deployed from commit ${context.sha.substring(0, 7)}._`
            });

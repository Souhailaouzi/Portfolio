# ============================================================
# Deploy Production
# ============================================================
# PURPOSE: When code is merged/pushed to main, this deploys
# the site to production on Netlify (your live website).
#
# This only runs AFTER the CI workflow passes (build + lint),
# so broken code never reaches production.
#
# REQUIRED SECRETS (set in GitHub repo Settings > Secrets):
# - NETLIFY_AUTH_TOKEN: Your Netlify personal access token
# - NETLIFY_SITE_ID: Your Netlify site ID
# ============================================================

name: Deploy Production

on:
  # Only runs when code lands on main
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Deploy to Netlify with "--prod" flag
      # This is the key difference from preview: "--prod" makes it LIVE
      - name: Deploy to Netlify (Production)
        run: |
          npm install -g netlify-cli
          netlify deploy --dir=out --prod --auth=${{ secrets.NETLIFY_AUTH_TOKEN }} --site=${{ secrets.NETLIFY_SITE_ID }}
